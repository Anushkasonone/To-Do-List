<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
</head>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
<body>
    <header>
        <h1>My To Do List</h1>
        <h2>stay organized stay productive</h2>
    </header>
    <div class="input-container">
        <input type="text" placeholder="What do you want to do?">
        <button>Add task</button>
    </div>
    <div class="Filters">
        <button>all</button>
        <button>active</button>
        <button>completed</button>
    </div>
    <ul class="task-list">
        <li>
            <input type="checkbox">
            Learn HTML
            <button>delete</button>
        </li>
        <li>
            <input type="checkbox">
            Learn CSS
            <button>delete</button>
        </li>
        <li>
            <input type="checkbox">
            Learn Javascript
            <button>delete</button>
        </li>
    </ul>
    <div class="stats">
        <div class="box">
            <h3>total tasks</h3>
            <p>5</p>
        </div>
        <div class="box">
            <h3>active</h3>
            <p>3</p>
        </div>
        <div class="box">
            <h3>completed</h3>
            <p>2</p>
        </div>

    </div>
    <footer>
        <p>You are doing good job</p>
    </footer>

</body>

</html>
